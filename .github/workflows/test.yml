name: Tests

# push·PR마다 핵심 로직 테스트를 자동 실행한다.
# 신호·백테스트·파서·성과추적·장세 분류의 회귀를 방지한다.

on:
  push:
    paths:
      - '**.py'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        # [v5.23] requirements.txt로 통일 — dotenv 누락으로 CI에서만
        # ImportError(수집 실패)가 나던 문제 해결. 로컬과 CI 환경 일치.
        run: |
          pip install pytest pyyaml
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v
