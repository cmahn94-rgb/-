name: Quant Strategy Daily Run

on:
  schedule:
    # UTC 기준 (GitHub Actions는 UTC 사용)
    # 실제 실행은 서버 부하에 따라 수 분 지연될 수 있음
    # → timeout-minutes + concurrency로 중복 실행 및 무한 대기 방지
    #
    # 00:05 UTC = 09:05 KST  (한국 장 시작 직후)
    # 06:50 UTC = 15:50 KST  (한국 장 마감 직후)
    # 14:35 UTC = 23:35 KST  (미국 장 중반)
    - cron: '05 0 * * *'
    - cron: '50 6 * * *'
    - cron: '35 14 * * *'
  workflow_dispatch:

# ─────────────────────────────────────────────────────
# [시간 밀림 해결책]
# concurrency: 같은 그룹의 실행이 동시에 2개 이상 겹치면
#              이전 실행을 취소하고 최신 실행만 남긴다.
# cancel-in-progress: true → 밀려서 쌓인 실행을 모두 취소
# ─────────────────────────────────────────────────────
concurrency:
  group: quant-daily-run
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # [시간 밀림 해결책]
    # timeout-minutes: 작업이 이 시간(분)을 초과하면 강제 종료.
    # 평소 실행 시간(~3분)의 3배로 설정 → 무한 대기 방지
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      # 실행 완료 시각을 로그에 기록 (실제 실행 시각 추적용)
      - name: Log execution time (KST)
        if: always()
        run: |
          echo "UTC:  $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST:  $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"
