name: Quant Strategy Daily Run

on:
  schedule:
    # ─────────────────────────────────────────────────────────────
    # [중요] GitHub Actions cron은 UTC 기준이다.
    # KST(한국) = UTC + 9 이므로, 원하는 KST 시각에서 9를 빼면 UTC 시각이 된다.
    #
    # 계산 예시:
    #   KST 09:00 → UTC 00:00  (자정)
    #   KST 15:30 → UTC 06:30
    #   KST 23:30 → UTC 14:30
    #
    # [새벽에 알림이 오는 원인과 해결책]
    # cron-job.org 같은 외부 트리거 서비스를 UTC/KST 혼동해서 설정하면
    # 예상과 9시간 다른 시각에 실행된다.
    # → 이 파일의 GitHub Actions 내장 cron만 사용하고 외부 트리거는 제거할 것.
    #
    # GitHub Actions cron 지연: 서버 부하 시 최대 5~10분 지연 가능.
    # 아래 시각은 정각보다 0분으로 설정 (5분 버퍼 불필요, 실제 지연은 1~3분 수준)
    # ─────────────────────────────────────────────────────────────

    # 09:00 KST — 한국 장 시작 (국내주식 + 크립토만 분석)
    # KST 09:00 = UTC 00:00
    - cron: '0 0 * * 1-5'     # 월~금 00:00 UTC = 월~금 09:00 KST

    # 15:30 KST — 한국 장 마감 (국내주식 + 크립토만 분석)
    # KST 15:30 = UTC 06:30
    - cron: '30 6 * * 1-5'    # 월~금 06:30 UTC = 월~금 15:30 KST

    # 23:30 KST — 미국 장 중반 (전체 분석: KR + US + 크립토)
    # KST 23:30 = UTC 14:30
    - cron: '30 14 * * 1-5'   # 월~금 14:30 UTC = 월~금 23:30 KST

  # 수동 실행: GitHub 웹사이트 Actions 탭 → "Run workflow" 버튼으로 즉시 실행 가능
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────
# [동시 실행 방지]
# 같은 그룹의 실행이 2개 이상 겹치면, 이전 것을 취소하고 새 것만 유지.
# cancel-in-progress: true → 밀려서 쌓인 실행 모두 취소
# ─────────────────────────────────────────────────────────────────
concurrency:
  group: quant-daily-run
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    # docs/ 폴더를 커밋·푸시하기 위해 쓰기 권한 필요
    permissions:
      contents: write

    # 평균 실행 시간(~3분)의 5배 = 15분으로 설정.
    # 이 시간을 초과하면 GitHub Actions가 강제 종료.
    # → 이전 실행이 무한 대기하면서 다음 실행을 막는 현상 방지
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # 3.10 → 3.11 업그레이드 (성능 향상)
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run analysis
        env:
          TELEGRAM_TOKEN:       ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY:       ${{ secrets.GEMINI_API_KEY }}
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          GNEWS_API_KEY:        ${{ secrets.GNEWS_API_KEY }}
          NEWSAPI_KEY:          ${{ secrets.NEWSAPI_KEY }}
          DART_API_KEY:         ${{ secrets.DART_API_KEY }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          # GitHub Pages URL — 텔레그램 메시지에 HTML 링크로 포함됨
          # 형식: https://[계정명].github.io/[레포명]
          # 예시: https://chulmin.github.io/quant-bot
          # 설정 안 하면 HTML은 생성되지만 텔레그램 링크는 안 붙음
          GH_PAGES_URL:         ${{ secrets.GH_PAGES_URL }}
        run: python main.py

      # ── HTML 리포트 → docs/ 폴더 → GitHub Pages 배포 ────────────
      # python main.py 실행 중 docs/ 폴더에 HTML 파일이 생성됨.
      # 이 step에서 변경된 파일을 main 브랜치에 커밋·푸시하면
      # GitHub Pages(main/docs 설정)가 자동으로 공개 사이트를 갱신한다.
      #
      # [GitHub Pages 첫 설정 방법]
      # 레포 → Settings → Pages → Source: main / docs → Save
      # 이후 https://[계정명].github.io/[레포명] 으로 접속 가능
      - name: Push HTML report to GitHub Pages
        if: success()
        run: |
          # git 사용자 설정 (GitHub Actions 봇 계정)
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # docs/ 폴더 변경사항 스테이징
          git add docs/

          # 변경사항 있을 때만 커밋 (없으면 에러 방지)
          if git diff --cached --quiet; then
            echo "📋 HTML 변경사항 없음 — 커밋 건너뜀"
          else
            KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M KST')
            git commit -m "📊 리포트 업데이트: ${KST}"
            git push
            echo "✅ GitHub Pages 배포 완료"
          fi

      # ── 실행 시각 로그 ──────────────────────────────────────────
      # 텔레그램 알림이 안 왔을 때,
      # GitHub Actions → 해당 실행 → "Log execution time" step에서
      # 실제로 몇 시에 실행됐는지 확인할 수 있다.
      - name: Log execution time (KST)
        if: always()
        run: |
          echo "============================================"
          echo "UTC:  $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "KST:  $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')"
          echo "종료 상태: ${{ job.status }}"
          echo "============================================"

      # ── 실패 시 텔레그램 오류 알림 ──────────────────────────────
      # Python 스크립트가 실패하거나, 패키지 설치가 안 되는 등
      # 어떤 이유로든 위 step이 하나라도 실패하면 이 step이 실행된다.
      #
      # [중학생 설명]
      # 알림이 안 왔을 때 GitHub를 열어볼 필요 없이,
      # 실패하면 텔레그램으로 "에러가 났어요!"를 바로 보내준다.
      - name: Notify failure via Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          KST=$(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M:%S')
          MESSAGE="❌ 퀀트 시스템 실행 실패%0A%0A시각: ${KST} KST%0A%0A원인 확인 방법:%0A1) GitHub Actions 탭 클릭%0A2) 실패한 step(빨간 X) 클릭%0A3) 로그에서 오류 메시지 확인"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}")
          echo "텔레그램 오류 알림 전송 결과: HTTP ${HTTP_STATUS}"
          true
